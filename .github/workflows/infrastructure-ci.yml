name: 🏗️ Infrastructure - CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - infrastructure/**
      - .github/workflows/infrastructure-ci.yml

permissions:
  actions: write
  contents: read
  pull-requests: write

env:
  TF_IN_AUTOMATION: "true"
  TF_CLI_ARGS: "-no-color"
  TF_VAR_app_secret_env_values: |
    {
      "GOOGLE_CLIENT_ID": "${{ secrets.GOOGLE_CLIENT_ID }}",
      "GOOGLE_CLIENT_SECRET": "${{ secrets.GOOGLE_CLIENT_SECRET }}",
      "MICROSOFT_CLIENT_ID": "${{ secrets.MICROSOFT_CLIENT_ID }}",
      "MICROSOFT_CLIENT_SECRET": "${{ secrets.MICROSOFT_CLIENT_SECRET }}",
      "R2_ACCESS_KEY_ID": "${{ secrets.R2_ACCESS_KEY_ID }}",
      "R2_SECRET_ACCESS_KEY": "${{ secrets.R2_SECRET_ACCESS_KEY }}",
      "R2_ACCOUNT_ID": "${{ vars.CLOUDFLARE_ACCOUNT_ID }}"
    }
  TF_VAR_repository_full_name: ${{ github.repository }}
  TF_VAR_neon_api_token: ${{ secrets.TF_VAR_NEON_API_TOKEN }}
  TF_VAR_neon_org_id: ${{ vars.NEON_ORG_ID }}
  TF_VAR_render_owner_id: ${{ vars.RENDER_OWNER_ID }}
  RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
  BETTERUPTIME_API_TOKEN: ${{ secrets.BETTERUPTIME_API_TOKEN }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
  TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: auto

jobs:
  lint_plan_and_comment:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Generate GitHub App token for Terraform
        id: gh_app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.CICD_AUTOMATION_GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.CICD_AUTOMATION_GH_APP_PK }}
          owner: ${{ github.repository_owner }}

      - name: Export GitHub provider token
        run: echo "TF_VAR_repository_token=${{ steps.gh_app_token.outputs.token }}" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Setup TFLint
        uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2

      - name: Terraform fmt check
        run: make fmt

      - name: TFLint
        run: make lint

      - name: Plan
        run: make init plan show-plan

      - name: Post sticky plan diff
        uses: marocchino/sticky-pull-request-comment@0ea0beb66eb9baf113663a64ec522f60e49231c0 # v3.0.4
        with:
          header: terraform-plan
          path: infrastructure/plan.txt
