name: 🏗️ Infrastructure - Apply

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - infrastructure/**
      - .github/workflows/infrastructure-apply.yml

permissions:
  actions: write
  contents: read

concurrency:
  group: infrastructure-apply-main
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_CLI_ARGS: "-no-color"
  TF_VAR_app_secret_env_values: |
    {
      "GOOGLE_CLIENT_ID": "${{ secrets.GOOGLE_CLIENT_ID }}",
      "GOOGLE_CLIENT_SECRET": "${{ secrets.GOOGLE_CLIENT_SECRET }}",
      "FACEBOOK_CLIENT_ID": "${{ secrets.FACEBOOK_CLIENT_ID }}",
      "FACEBOOK_CLIENT_SECRET": "${{ secrets.FACEBOOK_CLIENT_SECRET }}",
      "R2_ACCESS_KEY_ID": "${{ secrets.R2_ACCESS_KEY_ID }}",
      "R2_SECRET_ACCESS_KEY": "${{ secrets.R2_SECRET_ACCESS_KEY }}",
      "R2_ACCOUNT_ID": "${{ vars.CLOUDFLARE_ACCOUNT_ID }}"
    }
  TF_VAR_repository_full_name: ${{ github.repository }}
  TF_VAR_neon_api_token: ${{ secrets.TF_VAR_NEON_API_TOKEN }}
  TF_VAR_neon_org_id: ${{ vars.NEON_ORG_ID }}
  TF_VAR_render_owner_id: ${{ vars.RENDER_OWNER_ID }}
  RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
  BETTERUPTIME_API_TOKEN: ${{ secrets.BETTERUPTIME_API_TOKEN }}
  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
  TF_VAR_cloudflare_account_id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
  AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: auto

jobs:
  apply:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infrastructure

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Generate GitHub App token for Terraform
        id: gh_app_token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.CICD_AUTOMATION_GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.CICD_AUTOMATION_GH_APP_PK }}
          owner: ${{ github.repository_owner }}

      - name: Export GitHub provider token
        run: echo "TF_VAR_repository_token=${{ steps.gh_app_token.outputs.token }}" >> "$GITHUB_ENV"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Apply
        run: make apply-ci

      - name: Trigger Render deploy to refresh env group vars
        run: |
          SERVICE_ID=$(terraform output -raw app_service_id)
          curl --fail --silent --show-error --request POST \
            --url "https://api.render.com/v1/services/${SERVICE_ID}/deploys" \
            --header "Authorization: Bearer ${RENDER_API_KEY}" \
            --header "Content-Type: application/json" \
            --data '{"deployMode":"deploy_only"}'
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}

